name: codeql / frontend

permissions:
  actions: read
  contents: read
  security-events: write

on:
  push:
    branches: [main]
    paths:
      - '.github/workflow/pr-codeql-frontend.yml'
      - '**/*.ts'
      - '**/*.tsx'
      - '!**/*.test.ts'
      - '!**/*.test.tsx'
      - '**/yarn.lock'
      - '**/package.json'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflow/pr-codeql-frontend.yml'
      - '**/*.ts'
      - '**/*.tsx'
      - '!**/*.test.ts'
      - '!**/*.test.tsx'
      - '**/yarn.lock'
      - '**/package.json'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      with:
        fetch-depth: 2
        persist-credentials: false

    - name: Initialize CodeQL
      uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3.36.2
      with:
        languages: "javascript"

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3.36.2
